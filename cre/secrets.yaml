# CRE secrets mapping for local simulation.
#
# Values are read from environment variables (or .env in the cre/ directory).
# For deployed workflows, secrets are stored in the Vault DON via:
#   cre secrets set AEROAPI_KEY --value "your-key"
#
# During local simulation, set these in your shell or in cre/.env:
#   export AEROAPI_KEY="your_flightaware_api_key"

secrets:
  AEROAPI_KEY: "${AEROAPI_KEY}"
