# ==========================================================================
# CRE WORKFLOW SETTINGS FILE — Sentinel Protocol
# ==========================================================================
# Each target is a top-level key. Settings here override project.yaml values.
#
# Usage:
#   cre workflow simulate . --target local --trigger-index 0
#   cre workflow simulate . --target fuji  --trigger-index 0 --broadcast

# ==========================================================================
local:
  user-workflow:
    workflow-name: "sentinel-protocol-local"
  workflow-artifacts:
    workflow-path: "./src/workflow.ts"
    config-path: "./config.local.json"
    secrets-path: "./secrets.yaml"

# ==========================================================================
fuji:
  user-workflow:
    workflow-name: "sentinel-protocol-fuji"
  workflow-artifacts:
    workflow-path: "./src/workflow.ts"
    config-path: "./config.fuji.json"
    secrets-path: "./secrets.yaml"
